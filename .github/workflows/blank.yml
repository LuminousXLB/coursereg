# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the workflow will run
on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest
    permissions:
      contents: write

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      - uses: actions/checkout@v3

      - run: wget --no-verbose -i list.txt
      - run: pip3 install bs4 lxml

      - run: |
          gh repo clone $GITHUB_REPOSITORY repo
          git -C repo config user.name "GitHub Actions"
          git -C repo config user.email "$USER@$HOST"
        env:
          GH_TOKEN: ${{ github.token }}

      - run: |
          git -C repo checkout coursereg-report
          ./commit-report.sh
          git -C repo push https://$GH_TOKEN@$GITHUB_REPOSITORY

      - run: |
          git -C repo checkout soc-sched
          ./commit-sched.sh
          git -C repo push https://$GH_TOKEN@$GITHUB_REPOSITORY
